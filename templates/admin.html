<!DOCTYPE html>
<html>
<head>
<title>ADM</title>
</head>

<body>

<h2>Painel ADM</h2>

<h3>Motoristas</h3>

{% for m in motoristas %}

<p>

{{m["nome"]}} |
{{m["telefone"]}} |
{{m["cidade"]}} |
{{m["veiculo"]}} |
{{m["status"]}}

</p>

{% endfor %}

<h3>Entregas</h3>

{% for e in entregas %}

<p>

Coleta: {{e["coleta"]}} |
Entrega: {{e["entrega"]}} |
Valor: {{e["valor"]}}

</p>

{% endfor %}

</body>
</html>
