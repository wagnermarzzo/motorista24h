<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro Motorista</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#1e293b;
padding:30px;
border-radius:10px;
width:320px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
}

button{
width:100%;
margin-top:15px;
padding:12px;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Cadastro Motorista</h2>

<form method="POST">

<input name="nome" placeholder="Nome" required>

<input name="telefone" placeholder="Telefone" required>

<input name="cidade" placeholder="Cidade" required>

<select name="veiculo" required>

<option value="">Veículo</option>
<option value="moto">Moto</option>
<option value="carro">Carro</option>
<option value="van">Van</option>

</select>

<button>Cadastrar</button>

</form>

</div>

</body>
</html>
