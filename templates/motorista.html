<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Motorista</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.topo{
background:#020617;
padding:15px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.entrega{
background:#1e293b;
padding:15px;
margin-top:15px;
border-radius:8px;
}

button{
padding:10px;
margin-top:10px;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

select{
padding:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="topo">
<h2>Painel do Motorista</h2>
</div>

<div class="container">

<h3>Status</h3>

<form action="/status_motorista" method="POST">

<select name="status">
<option value="online">Online</option>
<option value="offline">Offline</option>
</select>

<button>Atualizar</button>

</form>

<h3>Entregas disponíveis</h3>

{% for e in entregas %}

<div class="entrega">

<p><b>Coleta:</b> {{e["coleta"]}}</p>
<p><b>Entrega:</b> {{e["entrega"]}}</p>
<p><b>Valor:</b> R$ {{e["valor"]}}</p>

<button>Aceitar entrega</button>

</div>

{% endfor %}

</div>

</body>
</html>
