<!DOCTYPE html>
<html>
<head>
<title>Painel Motorista</title>
</head>

<body>

<h2>Painel Motorista</h2>

<form action="/status_motorista" method="POST">

<select name="status">
<option value="online">Online</option>
<option value="offline">Offline</option>
</select>

<button>Atualizar Status</button>

</form>

<h3>Entregas disponíveis</h3>

{% for e in entregas %}

<p>

Coleta: {{e["coleta"]}} |
Entrega: {{e["entrega"]}} |
Valor: R$ {{e["valor"]}}

</p>

{% endfor %}

</body>
</html>
