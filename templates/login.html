<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Motorista24H</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:#0f172a;
color:white;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container-login{
display:flex;
gap:40px;
}

.box{
background:#1e293b;
padding:30px;
border-radius:15px;
width:300px;
}

input{
margin-bottom:10px;
}

.logo{
position:absolute;
top:20px;
left:30px;
font-size:24px;
font-weight:bold;
}

.admin{
position:absolute;
top:20px;
right:30px;
}

</style>

</head>

<body>

<div class="logo">
Motorista24H
</div>

<div class="admin">
<a href="/login_admin">
⚙️
</a>
</div>

<div class="container-login">

<div class="box">

<h3>Empresa</h3>

<form action="/login_empresa" method="post">

<input name="usuario" class="form-control" placeholder="Usuário">

<input name="senha" type="password" class="form-control" placeholder="Senha">

<button class="btn btn-primary w-100">
Entrar
</button>

</form>

</div>


<div class="box">

<h3>Motorista</h3>

<form action="/login_motorista" method="post">

<input name="usuario" class="form-control" placeholder="Usuário">

<input name="senha" type="password" class="form-control" placeholder="Senha">

<button class="btn btn-success w-100">
Entrar
</button>

</form>

</div>

</div>

</body>
  </html>
