<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1>Painel Admin</h1>

<h2>Faturamento total</h2>

R$ {{total}}

<h2>Motoristas</h2>

<table>

<tr>
<th>ID</th>
<th>Nome</th>
<th>Veículo</th>
<th>Status</th>
</tr>

{% for m in motoristas %}

<tr>

<td>{{m[0]}}</td>
<td>{{m[1]}}</td>
<td>{{m[3]}}</td>
<td>{{m[8]}}</td>

</tr>

{% endfor %}

</table>

<h2>Saques solicitados</h2>

<table>

<tr>
<th>ID</th>
<th>Motorista</th>
<th>Valor</th>
<th>Status</th>
</tr>

{% for s in saques %}

<tr>

<td>{{s[0]}}</td>
<td>{{s[1]}}</td>
<td>{{s[2]}}</td>
<td>{{s[3]}}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
