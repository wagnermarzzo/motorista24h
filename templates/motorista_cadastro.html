<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro Motorista</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:40px;
}

form{
max-width:500px;
margin:auto;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:none;
}

button{
padding:12px;
background:#0984e3;
border:none;
color:white;
width:100%;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Cadastro de Motorista</h2>

<form method="POST" enctype="multipart/form-data">

<input type="text" name="nome" placeholder="Nome completo" required>

<input type="text" name="endereco" placeholder="Endereço" required>

<input type="text" name="cpf" placeholder="CPF" required>

<input type="text" name="cnh" placeholder="CNH" required>

<input type="text" name="placa" placeholder="Placa do veículo" required>

<input type="text" name="telefone" placeholder="WhatsApp" required>

<label>Foto da CNH</label>
<input type="file" name="foto_cnh">

<label>Comprovante de endereço</label>
<input type="file" name="comprovante">

<label>Foto da placa</label>
<input type="file" name="foto_placa">

<button type="submit">Cadastrar</button>

</form>

</body>
</html>
