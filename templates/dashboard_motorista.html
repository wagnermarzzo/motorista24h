<!DOCTYPE html>
<html>

<head>

<title>Motorista</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container">

<h2>Painel Motorista</h2>

<a href="/logout" class="btn btn-danger">
Sair
</a>

<hr>

<a href="/status_online/online" class="btn btn-success">
Ficar Online
</a>

<a href="/status_online/offline" class="btn btn-secondary">
Ficar Offline
</a>

<hr>

<h4>Corridas disponíveis</h4>

<table class="table">

<tr>

<th>ID</th>
<th>Coleta</th>
<th>Destino</th>
<th>Valor</th>
<th></th>

</tr>

{% for e in entregas %}

<tr>

<td>{{e.id}}</td>

<td>{{e.coleta}}</td>

<td>{{e.destino}}</td>

<td>R$ {{e.valor}}</td>

<td>

<a href="/aceitar_entrega/{{e.id}}" class="btn btn-primary">
Aceitar
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
  </html>
