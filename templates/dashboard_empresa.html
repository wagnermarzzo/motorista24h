<!DOCTYPE html>
<html>

<head>

<title>Empresa</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container">

<h2>Painel da Empresa</h2>

<a href="/logout" class="btn btn-danger">
Sair
</a>

<a href="/criar_entrega" class="btn btn-primary">
Nova Entrega
</a>

<hr>

<h4>Corridas</h4>

<table class="table">

<tr>
<th>ID</th>
<th>Coleta</th>
<th>Destino</th>
<th>Valor</th>
<th>Status</th>
</tr>

{% for e in entregas %}

<tr>

<td>{{e.id}}</td>

<td>{{e.coleta}}</td>

<td>{{e.destino}}</td>

<td>R$ {{e.valor}}</td>

<td>{{e.status}}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
