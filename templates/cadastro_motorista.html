<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro Motorista</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{

background:#1e293b;
padding:30px;
border-radius:10px;
width:320px;

}

h2{
text-align:center;
margin-bottom:20px;
}

input,select{

width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;

}

button{

width:100%;
margin-top:15px;
padding:12px;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;

}

button:hover{
background:#16a34a;
}

</style>

</head>

<body>

<div class="box">

<h2>Cadastro de Motorista</h2>

<form method="POST" action="/cadastro_motorista">

<input type="text" name="nome" placeholder="Nome completo" required>

<input type="text" name="telefone" placeholder="Telefone / WhatsApp" required>

<input type="text" name="cidade" placeholder="Cidade" required>

<select name="veiculo" required>

<option value="">Tipo de veículo</option>
<option value="moto">Moto</option>
<option value="carro">Carro</option>
<option value="van">Van</option>

</select>

<button type="submit">Cadastrar</button>

</form>

</div>

</body>
</html>
